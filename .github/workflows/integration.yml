name: Integration Tests (kind)

# Run on push to main and on pull requests that touch agent code or the Helm chart.
# Integration tests are expensive (spin up a kind cluster), so they are scoped to
# the files most likely to break cluster-level behaviour.
"on":
  push:
    branches: [main]
    paths:
      - "agent/**"
      - "charts/**"
      - "tests/integration/**"
      - ".github/workflows/integration.yml"
  pull_request:
    branches: [main]
    paths:
      - "agent/**"
      - "charts/**"
      - "tests/integration/**"

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout and tooling
      # -----------------------------------------------------------------------
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: agent/go.sum

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      # -----------------------------------------------------------------------
      # 2. Build the agent binary and Docker image
      # -----------------------------------------------------------------------
      - name: Build agent binary
        working-directory: agent
        run: |
          go mod tidy
          go build -o /tmp/autosre-agent ./cmd/autosre

      - name: Build agent Docker image
        run: |
          docker build -t autosre/agent:integration -f agent/Dockerfile agent/ || \
          docker build -t autosre/agent:integration -f Dockerfile . || \
          echo "Dockerfile not found; skipping image build (will use binary directly)"

      # -----------------------------------------------------------------------
      # 3. Create kind cluster
      # -----------------------------------------------------------------------
      - name: Create kind cluster
        run: |
          kind create cluster --config kind-config.yaml --wait 60s
          kubectl cluster-info
          kubectl get nodes

      # -----------------------------------------------------------------------
      # 4. Set up test infrastructure (bare git repo for gitwriter)
      # -----------------------------------------------------------------------
      - name: Set up bare git repo for gitwriter
        run: |
          git init --bare /tmp/autosre-gitops-bare.git
          git clone /tmp/autosre-gitops-bare.git /tmp/autosre-gitops
          mkdir -p /tmp/autosre-gitops/namespaces/autosre-integration
          cat > /tmp/autosre-gitops/namespaces/autosre-integration/test-deployment.yaml << 'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: integration-test
            namespace: autosre-integration
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: integration-test
            template:
              metadata:
                labels:
                  app: integration-test
              spec:
                containers:
                  - name: app
                    image: busybox:1.36
                    command: ["sleep", "3600"]
                    resources:
                      limits:
                        memory: 64Mi
                      requests:
                        memory: 32Mi
          EOF
          cd /tmp/autosre-gitops
          git config user.email "ci@autosre.test"
          git config user.name "AutoSRE CI"
          git add .
          git commit -m "initial test deployment"
          git push origin main

      # -----------------------------------------------------------------------
      # 5. Start agent as a background process
      # -----------------------------------------------------------------------
      - name: Start autosre agent
        run: |
          mkdir -p /tmp/autosre-data
          ORCHESTRATOR_APPLY_ENABLED=true \
          STORE_DSN="file:/tmp/autosre-data/test.db?_journal_mode=WAL" \
          AUDIT_ENABLED=true \
          AUDIT_FILE_PATH=/tmp/autosre-data/audit.jsonl \
          GITOPS_REPO_PATH=/tmp/autosre-gitops \
          GIT_REMOTE_URL="file:///tmp/autosre-gitops-bare.git" \
          WEBHOOK_ADDR=":8080" \
          /tmp/autosre-agent run &
          echo $! > /tmp/autosre-agent.pid
          # Wait for agent to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
              echo "Agent is ready"
              break
            fi
            echo "Waiting for agent... ($i/30)"
            sleep 1
          done

      # -----------------------------------------------------------------------
      # 6. Run integration tests
      # -----------------------------------------------------------------------
      - name: Run integration tests
        working-directory: agent
        env:
          INTEGRATION_TEST: "true"
          AUTOSRE_AGENT_URL: "http://localhost:8080"
        run: |
          go test ./tests/integration/... -v -timeout 3m -count=1

      # -----------------------------------------------------------------------
      # 7. Collect logs on failure
      # -----------------------------------------------------------------------
      - name: Collect kind logs
        if: failure()
        run: |
          kind export logs /tmp/kind-logs --name autosre-dev
          cat /tmp/autosre-data/audit.jsonl 2>/dev/null || true

      - name: Upload kind logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kind-logs
          path: /tmp/kind-logs

      # -----------------------------------------------------------------------
      # 8. Cleanup
      # -----------------------------------------------------------------------
      - name: Stop agent
        if: always()
        run: |
          if [ -f /tmp/autosre-agent.pid ]; then
            kill $(cat /tmp/autosre-agent.pid) 2>/dev/null || true
          fi

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name autosre-dev
