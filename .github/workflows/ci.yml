name: CI

"on":
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ---------------------------------------------------------------------------
  # Go: lint + test
  # ---------------------------------------------------------------------------
  go-lint:
    name: Go Lint
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      # go.sum is generated here because it is not committed (Go toolchain is
      # unavailable on the dev machine — see docs/ERROR_LOG.md).
      - name: Tidy modules
        run: go mod tidy

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          working-directory: agent

  go-test:
    name: Go Test
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Tidy modules
        run: go mod tidy

      - name: Run tests
        run: go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: agent/coverage.out

  # ---------------------------------------------------------------------------
  # Python (diagnoser): lint + test
  # ---------------------------------------------------------------------------
  diagnoser-lint:
    name: Diagnoser Lint
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: diagnoser
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: black check
        run: black --check .

      - name: ruff check
        run: ruff check .

      - name: mypy
        run: mypy diagnoser/

  diagnoser-test:
    name: Diagnoser Test
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: diagnoser
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: pytest
        run: pytest --cov=diagnoser --cov-report=xml

  # ---------------------------------------------------------------------------
  # Python (learner): lint + test
  # ---------------------------------------------------------------------------
  learner-lint:
    name: Learner Lint
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: learner
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: black check
        run: black --check .

      - name: ruff check
        run: ruff check .

      - name: mypy
        run: mypy learner/

  learner-test:
    name: Learner Test
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: learner
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: pytest
        run: pytest --cov=learner --cov-report=xml

# NOTE: No build-and-push, no deploy steps in this CI skeleton.
# Those will be added in future prompts when services are production-ready.
