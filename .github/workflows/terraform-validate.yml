name: Terraform Validate

# Runs on every push/PR that touches infra/ — validates format and syntax
# without requiring real AWS/GCP/Azure credentials. No state is touched.
"on":
  push:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-validate.yml"
  pull_request:
    paths:
      - "infra/**"

jobs:
  validate:
    name: Terraform Init + Validate + Format
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # ---------------------------------------------------------------------------
      # terraform init with -backend=false: downloads providers (cached) but
      # does NOT connect to any real backend. Safe without cloud credentials.
      # ---------------------------------------------------------------------------
      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: infra/.terraform
          key: terraform-${{ hashFiles('infra/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: terraform init (no backend)
        run: terraform init -backend=false -input=false

      # ---------------------------------------------------------------------------
      # Validate: checks syntax, provider schema, and variable references.
      # Does NOT make any API calls to AWS/GCP/Azure.
      # ---------------------------------------------------------------------------
      - name: terraform validate
        run: terraform validate

      # ---------------------------------------------------------------------------
      # Format check: enforces canonical HCL formatting.
      # Fails if any .tf file is not formatted. Run `terraform fmt -recursive`
      # locally to fix.
      # ---------------------------------------------------------------------------
      - name: terraform fmt check
        run: terraform fmt -check -recursive -diff

      # ---------------------------------------------------------------------------
      # tflint: catches provider-specific issues that validate misses.
      # (best-effort; does not fail the build if tflint itself errors)
      # ---------------------------------------------------------------------------
      - name: Install tflint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          tflint --version

      - name: tflint
        run: tflint --recursive || true

  security-scan:
    name: Terraform Security Scan (tfsec)
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra
          soft_fail: true   # report findings but don't block the PR
