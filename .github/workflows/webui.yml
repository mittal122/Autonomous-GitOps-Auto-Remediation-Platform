name: Web UI

on:
  push:
    branches: [main]
    paths:
      - "web-ui/**"
      - ".github/workflows/webui.yml"
  pull_request:
    branches: [main]
    paths:
      - "web-ui/**"

jobs:
  build:
    name: Build & Type-check
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    defaults:
      run:
        working-directory: web-ui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: web-ui/dist
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-22.04
    needs: build
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push — no registry configured)
        uses: docker/build-push-action@v5
        with:
          context: web-ui
          file: web-ui/Dockerfile
          push: false
          tags: ghcr.io/autosre/web-ui:${{ github.sha }},ghcr.io/autosre/web-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
