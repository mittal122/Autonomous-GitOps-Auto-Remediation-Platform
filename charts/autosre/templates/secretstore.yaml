{{- if .Values.externalSecrets.enabled }}
# ---------------------------------------------------------------------------
# External Secrets Operator — SecretStore
# Connects ESO to the configured secrets backend (AWS Secrets Manager by
# default; HashiCorp Vault also supported via .Values.externalSecrets.provider).
#
# Prerequisites:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets-operator
# ---------------------------------------------------------------------------

{{- if eq .Values.externalSecrets.provider "aws" }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "autosre.fullname" . }}-aws-secretsmanager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "autosre.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.aws.region | default "us-east-1" | quote }}
      # IRSA: the agent ServiceAccount must be annotated with the IAM role ARN.
      # Add annotations: {eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT:role/autosre-secrets"}
      # to serviceAccount.annotations in values.yaml.

{{- else if eq .Values.externalSecrets.provider "vault" }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "autosre.fullname" . }}-vault
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "autosre.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: {{ .Values.externalSecrets.vault.server | quote }}
      path: {{ .Values.externalSecrets.vault.path | default "secret" | quote }}
      version: {{ .Values.externalSecrets.vault.version | default "v2" | quote }}
      auth:
        kubernetes:
          mountPath: {{ .Values.externalSecrets.vault.mountPath | default "kubernetes" | quote }}
          role: {{ .Values.externalSecrets.vault.role | default "autosre" | quote }}
          serviceAccountRef:
            name: {{ include "autosre.serviceAccountName" . }}

{{- else if eq .Values.externalSecrets.provider "gcpsm" }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "autosre.fullname" . }}-gcpsm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "autosre.labels" . | nindent 4 }}
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.externalSecrets.gcp.projectID | quote }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.externalSecrets.gcp.clusterLocation | default "us-central1" | quote }}
          clusterName: {{ .Values.externalSecrets.gcp.clusterName | quote }}
          serviceAccountRef:
            name: {{ include "autosre.serviceAccountName" . }}
            namespace: {{ .Release.Namespace }}

{{- end }}
{{- end }}
