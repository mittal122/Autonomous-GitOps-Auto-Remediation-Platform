{{- if .Values.externalSecrets.enabled }}
# ---------------------------------------------------------------------------
# External Secrets — pulls credentials from the configured secrets backend
# and materialises them as Kubernetes Secrets inside the namespace.
# The generated Secrets are referenced via envFrom in the deployment templates.
# ---------------------------------------------------------------------------

# Agent secrets: Slack, PagerDuty, Git token, audit encryption key.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "autosre.fullname" . }}-agent-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "autosre.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ include "autosre.fullname" . }}-{{ .Values.externalSecrets.provider }}
    kind: SecretStore
  target:
    name: {{ include "autosre.fullname" . }}-agent-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.secretPaths.slackBotToken | quote }}
        {{- if eq .Values.externalSecrets.provider "aws" }}
        property: SLACK_BOT_TOKEN
        {{- end }}
    - secretKey: SLACK_SIGNING_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.secretPaths.slackSigningSecret | quote }}
        {{- if eq .Values.externalSecrets.provider "aws" }}
        property: SLACK_SIGNING_SECRET
        {{- end }}
    - secretKey: PAGERDUTY_ROUTING_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.secretPaths.pagerdutyRoutingKey | quote }}
        {{- if eq .Values.externalSecrets.provider "aws" }}
        property: PAGERDUTY_ROUTING_KEY
        {{- end }}
    - secretKey: GIT_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.secretPaths.gitToken | quote }}
        {{- if eq .Values.externalSecrets.provider "aws" }}
        property: GIT_TOKEN
        {{- end }}
    {{- if .Values.externalSecrets.secretPaths.auditEncryptionKey }}
    - secretKey: AUDIT_ENCRYPTION_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.secretPaths.auditEncryptionKey | quote }}
        {{- if eq .Values.externalSecrets.provider "aws" }}
        property: AUDIT_ENCRYPTION_KEY
        {{- end }}
    {{- end }}
---
# Diagnoser secrets: Gemini API key.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "autosre.fullname" . }}-diagnoser-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "autosre.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ include "autosre.fullname" . }}-{{ .Values.externalSecrets.provider }}
    kind: SecretStore
  target:
    name: {{ include "autosre.fullname" . }}-diagnoser-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.secretPaths.geminiApiKey | quote }}
        {{- if eq .Values.externalSecrets.provider "aws" }}
        property: GEMINI_API_KEY
        {{- end }}
{{- end }}
